<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>G-Chaos Park | 物語一覧</title>
    <style>
        body { background: #fff; color: #1a1a1a; padding: 15px; font-family: sans-serif; margin: 0; padding-bottom: 80px; }
        
        .nav-bar { 
            display: flex; justify-content: flex-end; margin-bottom: 20px; 
            border-bottom: 2px solid #000; padding-bottom: 15px; padding-top: 10px;
        }
        .nav-bar a { color: #000; text-decoration: none; font-weight: bold; font-size: 0.95rem; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 30px; }
        .tab-btn { 
            padding: 10px 20px; border: 2px solid #000; border-radius: 30px; 
            cursor: pointer; font-size: 0.9rem; font-weight: bold; 
            background: #fff; color: #000; transition: 0.2s;
        }
        .tab-btn.active { background: #000; color: #fff; }
        
        #story-list { 
            text-align: center; padding: 60px 20px; color: #666; font-weight: bold;
            font-size: 1.1rem; background: #f9f9f9; border-radius: 8px; border: 1px dashed #ccc;
        }

        /* 執筆ボタン（右下固定フローティング） */
        .fab-write {
            position: fixed; bottom: 20px; right: 20px;
            background: #000; color: #fff; text-decoration: none;
            width: 60px; height: 60px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }
        .fab-write:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <!-- ラウンジへ戻る導線のみ -->
    <nav class="nav-bar">
        <a href="lounge.html">🏠 ラウンジへ戻る</a>
    </nav>

    <div class="tabs">
        <div class="tab-btn active" id="tab-new" onclick="switchTab('new')">新着順</div>
        <div class="tab-btn" id="tab-popular" onclick="switchTab('popular')">人気作品</div>
    </div>

    <div id="story-list">
        作品はまだありません
    </div>

    <!-- 執筆ページへの誘導ボタン -->
    <a href="story.html" class="fab-write" title="物語を書く">✍️</a>

    <script>
        function switchTab(tabName) {
            document.getElementById('tab-new').classList.remove('active');
            document.getElementById('tab-popular').classList.remove('active');
            
            if (tabName === 'new') {
                document.getElementById('tab-new').classList.add('active');
            } else {
                document.getElementById('tab-popular').classList.add('active');
            }
            document.getElementById('story-list').innerText = "作品はまだありません";
        }
    </script>
</body>
</html>
