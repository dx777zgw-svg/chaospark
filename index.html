<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>G-Chaos Park | 開園</title>
    <style>
        body { margin: 0; background: #000; color: #fff; overflow: hidden; font-family: 'Helvetica Neue', Arial, sans-serif; }
        
        /* 動画を全画面表示 */
        #opening-video { width: 100vw; height: 100vh; object-fit: cover; }
        
        /* ゲートUI（最初は非表示） */
        #gate-ui { 
            display: none; 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            text-align: center; 
            background: rgba(20, 20, 20, 0.9); 
            padding: 30px; 
            border: 2px solid #ff00ff; 
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.3);
            width: 90%;
            max-width: 400px;
        }
        
        .lico-img { height: 25vh; max-height: 200px; filter: drop-shadow(0 0 15px rgba(255,0,255,0.6)); margin-bottom: 15px; }
        .speech-text { font-size: 0.95rem; line-height: 1.5; margin-bottom: 20px; font-weight: bold; }
        
        .terms-link { color: #00ffff; text-decoration: underline; display: block; margin-bottom: 20px; font-size: 0.9rem; }
        
        input[type="text"] { width: 100%; padding: 12px; background: #222; border: 1px solid #555; color: #fff; border-radius: 5px; margin-bottom: 20px; font-size: 1rem; box-sizing: border-box; }
        
        .btn-enter { background: #ff00ff; color: #fff; padding: 12px 20px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; width: 100%; transition: background 0.3s; font-size: 1rem; }
        .btn-enter:hover { background: #cc00cc; }
        .btn-enter:disabled { background: #555; cursor: not-allowed; }
    </style>
</head>
<body>

    <video id="opening-video" src="opening.mp4" autoplay playsinline muted></video>

    <div id="gate-ui">
        <img src="LICO.png" alt="LICO" class="lico-img" onerror="this.style.display='none';">
        <div class="speech-text">
            「ようこそ、G-Chaos Parkへ。<br>まずは利用規約を確認し、<br>同意の署名をお願いします。」
        </div>
        
        <a href="terms.html" class="terms-link">📄 利用規約を確認する</a>
        
        <input type="text" id="username" placeholder="住民名を入力（最大10文字）" maxlength="10">
        <button id="enter-btn" class="btn-enter">規約に同意して入園する</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Firebaseの設定
        const firebaseConfig = {
            apiKey: "AIzaSyCfmebBH61qeXPLbo-X5n2D7quDitXXIEA",
            authDomain: "g-chaospark.firebaseapp.com",
            databaseURL: "https://g-chaospark-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "g-chaospark",
            storageBucket: "g-chaospark.firebasestorage.app",
            messagingSenderId: "256664886136",
            appId: "1:256664886136:web:e87bbe307a654331c1468d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 動画とUIの制御
        const video = document.getElementById('opening-video');
        const gateUi = document.getElementById('gate-ui');

        video.onended = () => {
            video.style.display = 'none';
            gateUi.style.display = 'block';
        };

        // 万が一動画が読み込めない/ブロックされた場合のフェイルセーフ（5秒後にUI強制表示）
        setTimeout(() => {
            if (gateUi.style.display !== 'block') {
                video.style.display = 'none';
                gateUi.style.display = 'block';
            }
        }, 5000);

        // 入園ボタンの処理
        document.getElementById('enter-btn').addEventListener('click', async () => {
            const name = document.getElementById('username').value.trim();
            const btn = document.getElementById('enter-btn');
            
            if(!name) { 
                alert("名前の署名が必要です。"); 
                return; 
            }

            // 連打防止のボタンロック
            btn.disabled = true;
            btn.innerText = "戸籍を登録中...";

            // 被りにくいUIDを生成
            const uid = 'user_' + Date.now() + '_' + Math.floor(Math.random() * 1000);
            
            try {
                // Firebase DBへ書き込み
                await set(ref(db, 'users/' + uid), {
                    name: name,
                    avatar: "🧑",         // 初期アイコン
                    role: "none",        // 役職なし
                    style: "default",    // 装飾なし
                    points: {
                        cp: 100,         // 初回ボーナス
                        cm: 0
                    },
                    createdAt: new Date().toISOString()
                });
                
                // localStorageにセッション情報を保持
                localStorage.setItem('userUID', uid);
                localStorage.setItem('userName', name);
                
                // メインラウンジへ遷移
                window.location.href = 'lounge.html';
                
            } catch (error) {
                alert("通信エラーが発生しました。電波の良い場所で再度お試しください。");
                console.error("DB書き込みエラー:", error);
                
                // エラー時はボタンを復活させる
                btn.disabled = false;
                btn.innerText = "規約に同意して入園する";
            }
        });
    </script>
</body>
</html>
