<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>G-Chaos Park | 入国ゲート</title>
    <style>
        body { margin: 0; padding: 0; background-color: #0a0a0a; color: #d1d1d1; font-family: 'Helvetica Neue', Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .gate-box { background: rgba(26, 26, 26, 0.9); border: 2px solid #ff00ff; padding: 30px; border-radius: 10px; text-align: center; box-shadow: 0 0 15px rgba(255, 0, 255, 0.3); width: 80%; max-width: 400px; }
        h1 { color: #fff; font-size: 1.5rem; margin-bottom: 5px; }
        h1 span { color: #ff00ff; }
        p { font-size: 0.9rem; margin-bottom: 20px; color: #aaa; }
        input[type="text"] { width: 100%; padding: 10px; background: #222; border: 1px solid #555; color: #fff; border-radius: 5px; margin-bottom: 15px; font-size: 1rem; box-sizing: border-box; }
        button { background: #ff00ff; color: #fff; border: none; padding: 12px 20px; border-radius: 5px; font-size: 1rem; font-weight: bold; cursor: pointer; width: 100%; transition: background 0.3s; }
        button:hover { background: #cc00cc; }
        .error-msg { color: #ff3333; font-size: 0.8rem; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div class="gate-box">
        <h1>G-Chaos <span>Park</span></h1>
        <p>パークへようこそ。入国手続きを行います。</p>
        
        <input type="text" id="username-input" placeholder="あなたの名前を入力（最大10文字）" maxlength="10">
        <button id="enter-btn">入国する</button>
        <div id="error-msg" class="error-msg">名前を入力してください。</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Firebaseの設定
        const firebaseConfig = {
            apiKey: "AIzaSyCfmebBH61qeXPLbo-X5n2D7quDitXXIEA",
            authDomain: "g-chaospark.firebaseapp.com",
            databaseURL: "https://g-chaospark-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "g-chaospark",
            storageBucket: "g-chaospark.firebasestorage.app",
            messagingSenderId: "256664886136",
            appId: "1:256664886136:web:e87bbe307a654331c1468d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 簡易的な一意のID生成関数（Firebase Authを使わない場合の代替策）
        function generateUID() {
            return 'user_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
        }

        document.getElementById('enter-btn').addEventListener('click', async () => {
            const nameInput = document.getElementById('username-input').value.trim();
            const errorMsg = document.getElementById('error-msg');

            if (!nameInput) {
                errorMsg.style.display = 'block';
                return;
            }

            // 既にlocalStorageにUIDがあるか確認（二重入国防止）
            let uid = localStorage.getItem('userUID');
            
            if (!uid) {
                // 新規入国の場合
                uid = generateUID();
                
                // Firebase DBに初期データを書き込む
                const userRef = ref(db, 'users/' + uid);
                
                try {
                    await set(userRef, {
                        name: nameInput,
                        avatar: "🧑",         // 初期アイコン
                        role: "none",        // 役職なし
                        style: "default",    // 装飾なし
                        points: {
                            cp: 100,         // 初回入国ボーナス100CP
                            cm: 0            // CMは0からスタート
                        },
                        createdAt: new Date().toISOString()
                    });

                    // 成功したらローカルストレージに保存
                    localStorage.setItem('userUID', uid);
                    localStorage.setItem('userName', nameInput);
                    localStorage.setItem('userAvatar', "🧑");

                    // メイン画面へ遷移
                    window.location.href = 'main.html'; // 送ってくれた画面のファイル名に合わせる

                } catch (error) {
                    console.error("DB書き込みエラー:", error);
                    errorMsg.innerText = "通信エラーが発生しました。";
                    errorMsg.style.display = 'block';
                }
            } else {
                // 既にUIDを持っている場合（名前変更などの処理は後日拡張可能）
                // とりあえず今回はそのままメインへ飛ばす
                localStorage.setItem('userName', nameInput);
                window.location.href = 'main.html';
            }
        });
    </script>
</body>
</html>
