<div id="gate-screen">
    <h1>G-Chaos Park 入国審査ゲート</h1>

    <div id="lico-container">
        <img src="LICO.png" id="lico-img" onerror="this.style.display='none';">
        <div id="speech-bubble">
            <div id="lico-name">Lico</div>
            <p id="lico-text">……ゲートへようこそ。入国には審査が必要よ。</p>
            
            <div id="name-input-area" style="display:none;">
                <input type="text" id="user-name" placeholder="名前を入力して……" maxlength="10">
                <button onclick="checkName()">送信</button>
            </div>

            <button id="start-btn" onclick="startProcess()">審査を開始する</button>
            
            <a href="terms.html" target="_blank" id="terms-link-btn" style="display:none;" onclick="showNext()">規約を確認して同意する</a>
        </div>
    </div>
</div>

<script>
    let step = 0;

    function startProcess() {
        document.getElementById('lico-text').innerText = "はじめてみる顔ね！あなたの名前は？";
        document.getElementById('start-btn').style.display = "none";
        document.getElementById('name-input-area').style.display = "block";
    }

    function checkName() {
        let name = document.getElementById('user-name').value;
        if (!name) return alert('名前をちょうだい。');
        
        sessionStorage.setItem('userName', name);
        document.getElementById('lico-text').innerText = name + "さんね！まずは規約を読んでくれる？";
        document.getElementById('name-input-area').style.display = "none";
        document.getElementById('terms-link-btn').style.display = "block";
    }

    // 規約ページから戻ってきた後の挙動は、lounge.html側でID発行と合わせてやるべ！
</script>
