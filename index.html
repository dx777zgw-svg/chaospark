<style>
    /* ゲート背景をmon.pngに設定だべ */
    #gate-screen {
        margin: 0;
        height: 100vh;
        display: none; /* 最初は隠しておくべ */
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('mon.png') no-repeat center center/cover;
        color: #fff;
        font-family: 'Arial', sans-serif;
        text-align: center;
    }
    #lico-container {
        position: fixed;
        bottom: 0;
        left: 0;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        z-index: 100;
        padding-left: 20px;
    }
    #lico-img { height: 60vh; filter: drop-shadow(0 0 10px rgba(255,0,255,0.5)); }
    #speech-bubble {
        background: rgba(0, 0, 0, 0.8);
        border: 2px solid #ff00ff;
        color: #fff;
        padding: 20px;
        border-radius: 15px;
        width: 300px;
        margin-bottom: 20px;
        text-align: left;
    }
</style>

<script>
    function startExperience() {
        // 警告画面を消して、動画レイヤーを表示
        document.getElementById('volume-warning').style.display = 'none';
        document.getElementById('opening-layer').style.display = 'block';
        
        // 動画を取得して再生
        const video = document.getElementById('op-video');
        video.muted = false; // 音声有効化！
        
        // 再生命令だべ
        video.play().catch(function(error) {
            console.log("ブラウザにブロックされたべ。画面をクリックして許可するべ！: " + error);
        });
    }

    function hideMovie() {
        document.getElementById('opening-layer').style.display = 'none';
        document.getElementById('gate-screen').style.display = 'flex';
    }

    function startProcess() {
        document.getElementById('lico-text').innerText = "はじめてみる顔ね！あなたの名前は？";
        document.getElementById('start-btn').style.display = "none";
        document.getElementById('name-input-area').style.display = "block";
    }

    function checkName() {
        let name = document.getElementById('user-name').value;
        if (!name) return alert('名前をちょうだい。');
        sessionStorage.setItem('userName', name);
        document.getElementById('lico-text').innerText = name + "さんね！まずは規約を読んでくれる？";
        document.getElementById('name-input-area').style.display = "none";
        document.getElementById('terms-link-btn').style.display = "block";
    }
</script>
