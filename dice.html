<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>G-Chaospark | カオス・ダイス</title>
    <style>
        body { margin: 0; background: #0a0a0a; color: #fff; font-family: 'Courier New', monospace; text-align: center; padding: 50px; }
        .input-bet { padding: 10px; font-size: 18px; width: 150px; text-align: center; background: #222; color: #00e5ff; border: 1px solid #00e5ff; }
        .btn { padding: 10px 20px; font-size: 18px; margin: 10px; cursor: pointer; background: #00e5ff; color: #000; border: none; font-weight: bold; }
        .btn:hover { background: #fff; }
        .dice-display { font-size: 80px; margin: 20px 0; text-shadow: 0 0 15px #00e5ff; }
        .back-btn { display: inline-block; margin-top: 50px; padding: 10px 20px; border: 1px solid #00e5ff; color: #00e5ff; text-decoration: none; }
    </style>
</head>
<body>
    <h1 style="color: #00e5ff;">カオス・ダイス</h1>
    <h2 style="color: #00ff41;">所持CP: <span id="cp-display"></span></h2>
    
    <p>賭けるCPを入力して、サイコロの目が「Low(1-3)」か「High(4-6)」か予想するべ！</p>
    <input type="number" id="bet-amount" class="input-bet" value="10" min="1"> CP

    <div style="margin-top: 20px;">
        <button class="btn" onclick="rollDice('low')">⬇️ Low (1-3) ⬇️</button>
        <button class="btn" onclick="rollDice('high')">⬆️ High (4-6) ⬆️</button>
    </div>

    <div id="dice-result" class="dice-display">🎲</div>
    <div id="result-text" style="font-size: 24px; font-weight: bold; margin-top: 20px;"></div>

    <a href="gamebooth.html" class="back-btn">▶ ブースへ戻る</a>

    <script>
        function updateCP() {
            document.getElementById('cp-display').innerText = localStorage.getItem('chaosPoint') || 0;
        }
        updateCP();

        function rollDice(guess) {
            let cp = parseInt(localStorage.getItem('chaosPoint')) || 0;
            let bet = parseInt(document.getElementById('bet-amount').value);

            if (isNaN(bet) || bet <= 0) return alert("賭け金がおかしいべ！");
            if (cp < bet) return alert("CPが足りないべ！");

            cp -= bet; // 先にベット分を引く
            
            let roll = Math.floor(Math.random() * 6) + 1; // 1~6のランダム
            let isHigh = roll >= 4;
            let win = (guess === 'high' && isHigh) || (guess === 'low' && !isHigh);

            document.getElementById('dice-result').innerText = roll;

            if (win) {
                cp += bet * 2; // 倍返し
                document.getElementById('result-text').innerHTML = `<span style='color: #00ff41;'>アタリだべ！！ +${bet} CPの儲け！</span>`;
            } else {
                document.getElementById('result-text').innerHTML = `<span style='color: #ff003c;'>ハズレだべ... -${bet} CP没収！</span>`;
            }

            localStorage.setItem('chaosPoint', cp);
            updateCP();
        }
    </script>
</body>
</html>
