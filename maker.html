<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>G-Chaospark | 診断制作所ゲート</title>
    <style>
        /* ラウンジの雰囲気を引き継いだ無機質ダークテーマ */
        body {
            margin: 0; background: #0a0a0a; color: #d1d1d1;
            font-family: 'Courier New', Courier, monospace;
            height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        
        h1 { color: #00ff41; letter-spacing: 5px; margin-bottom: 50px; text-shadow: 0 0 10px rgba(0,255,65,0.3); }
        
        /* 選択肢を横に並べるコンテナ */
        .branch-container { display: flex; gap: 40px; }
        
        /* 各ルートのパネル */
        .branch-box {
            border: 2px solid #333; background: #121212; padding: 40px 30px;
            width: 320px; text-align: center; cursor: pointer;
            transition: all 0.3s ease; display: flex; flex-direction: column; justify-content: space-between;
        }
        
        /* マウスを乗せた時の発光と浮遊エフェクト */
        .branch-box:hover { border-color: #00ff41; transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,255,65,0.2); }
        
        .branch-title { font-size: 28px; font-weight: bold; color: #fff; margin-bottom: 20px; border-bottom: 1px dashed #444; padding-bottom: 10px; }
        .branch-desc { font-size: 14px; color: #aaa; margin-bottom: 30px; line-height: 1.6; text-align: left; }
        
        /* 決定ボタン */
        .enter-btn {
            background: transparent; color: #00ff41; border: 1px solid #00ff41;
            padding: 12px; font-size: 16px; cursor: pointer; font-family: inherit; transition: 0.3s;
        }
        .branch-box:hover .enter-btn { background: #00ff41; color: #000; font-weight: bold; }
        
        /* 帰還用リンク（ひっそりと） */
        .back-link { margin-top: 60px; color: #444; text-decoration: none; font-size: 12px; transition: color 0.3s; }
        .back-link:hover { color: #00ff41; text-decoration: underline; }
    </style>
</head>
<body>

    <h1>[ 診断制作所 - ゲート - ]</h1>

    <div class="branch-container">
        
        <div class="branch-box" onclick="location.href='create.html'">
            <div class="branch-title">🛠️ 作る</div>
            <div class="branch-desc">
                「正常」から「異界」まで、5段階の結果判定を持つ狂気の診断を組み上げる場所だべ。<br><br>己の脳内イメージをシステムに定着させ、新たなカオスポイントの源泉を生み出せ。
            </div>
            <button class="enter-btn">アトリエへ接続</button>
        </div>

        <div class="branch-box" onclick="location.href='play.html'">
            <div class="branch-title">🎮 診断をやる</div>
            <div class="branch-desc">
                テキストベースの「観測レベル」測定や、他者の脳内を覗き込むような診断に挑む場所だべ。<br><br>システムに蓄積されたカオスを消費し、自らの存在証明（ポイント）を獲得しろ。
            </div>
            <button class="enter-btn">プレイエリアへ接続</button>
        </div>

    </div>

    <a href="lounge.html" class="back-link">▶ メインラウンジへ帰還する</a>

</body>
</html>
