<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>G-Chaospark | My Page</title>
    <style>
        body { 
            margin: 0; background: #050505; color: #e0e0e0; 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            display: flex; justify-content: center; align-items: flex-start; 
            min-height: 100vh; padding: 20px; box-sizing: border-box;
            background-image: radial-gradient(circle at center, #111 0%, #000 100%);
        }
        
        /* スタイリッシュなメインパネル */
        .mypage-container {
            width: 100%; max-width: 600px; 
            background: rgba(18, 18, 18, 0.8); 
            border: 1px solid #333; border-top: 3px solid #ffd700; 
            border-radius: 8px; padding: 30px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            position: relative; margin-top: 20px;
        }

        h1 { margin-top: 0; color: #fff; font-size: 1.5em; border-bottom: 1px solid #333; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center;}
        
        /* アバターエリア */
        .profile-header { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; }
        .avatar-box {
            width: 80px; height: 80px; background: #222; 
            border: 2px dashed #555; border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 3em; cursor: pointer; transition: 0.3s; flex-shrink: 0;
        }
        .avatar-box:hover { border-color: #ffd700; transform: scale(1.05); background: #333;}
        .user-info h2 { margin: 0; font-size: 1.5em; color: #fff; word-break: break-all; }
        .user-info p { margin: 5px 0 0; color: #888; font-size: 0.9em; }

        /* ステータスボード */
        .status-board { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .status-card { 
            background: #0a0a0a; border: 1px solid #222; 
            padding: 20px; border-radius: 5px; text-align: center; 
        }
        .status-title { font-size: 0.9em; color: #aaa; margin-bottom: 10px; font-weight: bold; }
        .cp-val { font-size: 1.8em; font-weight: bold; color: #00ff41; }
        .cm-val { font-size: 1.8em; font-weight: bold; color: #ffd700; }

        /* ボタン類 */
        .btn { 
            display: inline-block; width: 100%; text-align: center; box-sizing: border-box;
            padding: 12px; background: transparent; border: 1px solid #555; 
            color: #ccc; text-decoration: none; font-weight: bold; 
            border-radius: 4px; cursor: pointer; transition: 0.3s;
        }
        .btn:hover { background: #222; color: #fff; border-color: #fff; }
        .btn-lounge { border-color: #00ff41; color: #00ff41; margin-top: 20px; }
        .btn-lounge:hover { background: #003300; border-color: #00ff41; color: #00ff41; }

        /* アバター選択モーダル */
        #avatar-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: #111; border: 1px solid #444; padding: 20px; border-radius: 8px; text-align: center; width: 300px;
        }
        .emoji-grid { display: flex; justify-content: space-around; flex-wrap: wrap; gap: 10px; margin: 20px 0; }
        .emoji-item { font-size: 2.5em; cursor: pointer; padding: 10px; border-radius: 5px; transition: 0.2s; }
        .emoji-item:hover { background: #333; transform: scale(1.2); }

        /* 自分が作った診断リスト */
        .my-diagnoses-section { margin-top: 40px; border-top: 1px dashed #333; padding-top: 20px; }
        .section-title { font-size: 1.1rem; color: #fff; margin-bottom: 15px; padding-left: 10px; border-left: 4px solid #00e5ff; font-weight: bold; }
        
        .diag-item {
            background: #0a0a0a; border: 1px solid #222; padding: 15px; border-radius: 8px;
            margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center;
        }
        .diag-info { flex-grow: 1; margin-right: 15px; overflow: hidden; }
        .diag-title { color: #00ff41; font-weight: bold; font-size: 1.1rem; margin: 0 0 5px 0; word-break: break-all; }
        .diag-desc { font-size: 0.85rem; color: #aaa; margin: 0; word-break: break-all; }

        /* 操作ボタン */
        .btn-area { display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }
        @media (min-width: 480px) { .btn-area { flex-direction: row; } }
        .btn-edit { background: transparent; border: 1px solid #00e5ff; color: #00e5ff; padding: 6px 12px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .btn-edit:hover { background: #00e5ff; color: #000; }
        .btn-delete { background: transparent; border: 1px solid #ff003c; color: #ff003c; padding: 6px 12px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .btn-delete:hover { background: #ff003c; color: #fff; }

        /* 修正用モーダル（最新スキーマ対応版） */
        #edit-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); z-index: 10000; justify-content: center; align-items: center;
            box-sizing: border-box; padding: 20px;
        }
        #edit-window {
            background: #111; border: 2px solid #00e5ff; border-radius: 10px;
            width: 100%; max-width: 500px; padding: 25px; box-sizing: border-box;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.2); max-height: 90vh; overflow-y: auto;
        }
        #edit-window h2 { color: #00e5ff; margin-top: 0; text-align: center; font-size: 1.3rem; border-bottom: 1px dashed #333; padding-bottom: 10px; }
        
        .form-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 5px; color: #aaa; font-size: 0.9rem; font-weight: bold; }
        input[type="text"], textarea {
            width: 100%; background: #000; border: 1px solid #444; color: #fff;
            padding: 10px; box-sizing: border-box; font-family: inherit; border-radius: 4px; font-size: 16px;
        }
        input[type="text"]:focus, textarea:focus { border-color: #00e5ff; outline: none; }
        #edit-base { height: 80px; resize: vertical; }
        #edit-result-list { height: 120px; resize: vertical; font-family: monospace; }

        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .btn-save { flex: 1; background: #00ff41; color: #000; border: none; padding: 12px; font-weight: bold; cursor: pointer; border-radius: 4px; font-size: 1rem; }
        .btn-save:hover { background: #fff; }
        .btn-cancel { flex: 1; background: #333; color: #ccc; border: none; padding: 12px; font-weight: bold; cursor: pointer; border-radius: 4px; font-size: 1rem; }
        .btn-cancel:hover { background: #444; color: #fff; }
    </style>
</head>
<body>

    <script>
        if (!localStorage.getItem('userId')) {
            alert("Lico「誰だお前は。ゲートを通って出直してきなさい。」");
            window.location.href = 'index.html';
        }
    </script>

    <div id="avatar-modal">
        <div class="modal-content">
            <h3 style="margin-top:0; color:#fff;">初期アイコンを選択</h3>
            <p style="color:#888; font-size:0.9em;">※後で変更できます</p>
            <div class="emoji-grid">
                <div class="emoji-item" onclick="setAvatar('👦')">👦</div>
                <div class="emoji-item" onclick="setAvatar('👧')">👧</div>
                <div class="emoji-item" onclick="setAvatar('🐶')">🐶</div>
                <div class="emoji-item" onclick="setAvatar('👽')">👽</div>
                <div class="emoji-item" onclick="setAvatar('👤')">👤</div>
                <div class="emoji-item" onclick="setAvatar('🤖')">🤖</div>
                <div class="emoji-item" onclick="setAvatar('🤡')">🤡</div>
                <div class="emoji-item" onclick="setAvatar('👻')">👻</div>
            </div>
            <button class="btn" onclick="closeAvatarModal()">閉じる</button>
        </div>
    </div>

    <div id="edit-modal">
        <div id="edit-window">
            <h2>📝 診断内容の改変（システム干渉）</h2>
            <input type="hidden" id="edit-id">
            
            <div class="form-group">
                <label>📌 診断タイトル</label>
                <input type="text" id="edit-title">
            </div>
            <div class="form-group">
                <label>📝 説明文</label>
                <textarea id="edit-desc" style="height: 60px;"></textarea>
            </div>
            <div class="form-group">
                <label>💬 基本テキスト</label>
                <textarea id="edit-base" placeholder="例：[name]の戦闘力は...【[結果]】です！"></textarea>
            </div>
            <div class="form-group">
                <label>🎲 結果リスト（改行で区切る）</label>
                <textarea id="edit-result-list" placeholder="例：&#10;5&#10;53万&#10;計測不能"></textarea>
            </div>
            
            <div class="modal-btns">
                <button class="btn-save" onclick="saveEdit()">データを上書き（保存）</button>
                <button class="btn-cancel" onclick="closeEditModal()">キャンセル</button>
            </div>
        </div>
    </div>

    <div class="mypage-container">
        <h1>RESIDENT DATA <span style="font-size: 0.5em; color: #ffd700;">G-Chaos Park</span></h1>

        <div class="profile-header">
            <div class="avatar-box" id="user-avatar" onclick="openAvatarModal()" title="アイコンを変更">👤</div>
            <div class="user-info">
                <h2 id="display-name">NO NAME</h2>
                <p id="display-id">ID: ---------</p>
            </div>
        </div>

        <div class="status-board">
            <div class="status-card">
                <div class="status-title">カオスポイント (CP)</div>
                <div class="cp-val" id="display-cp">0</div>
            </div>
            <div class="status-card">
                <div class="status-title">作者マイレージ (CM)</div>
                <div class="cm-val" id="display-cm">0</div>
            </div>
        </div>

        <button class="btn">💳 所持アイテム・称号を見る (未実装)</button>
        
        <div class="my-diagnoses-section">
            <div class="section-title">🛠️ あなたが創造したカオス診断一覧</div>
            <div id="diagnoses-container">
                <div style="text-align: center; color: #555; padding: 20px;">データベースをスキャン中だべ...🔄</div>
            </div>
        </div>

        <a href="lounge.html" class="btn btn-lounge">◀ メインラウンジに戻る</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, get, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCfmebBH61qeXPLbo-X5n2D7quDitXXIEA",
            authDomain: "g-chaospark.firebaseapp.com",
            databaseURL: "https://g-chaospark-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "g-chaospark",
            storageBucket: "g-chaospark.firebasestorage.app",
            messagingSenderId: "256664886136",
            appId: "1:256664886136:web:e87bbe307a654331c1468d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const userId = localStorage.getItem('userId') || 'UNKNOWN_ID';
        const userName = localStorage.getItem('userName') || 'ゲスト';
        
        document.getElementById('display-id').innerText = `ID: ${userId}`;
        document.getElementById('display-name').innerText = userName;

        const userRef = ref(db, 'users/' + userId);

        // クラウドから最新のポイントとアバターをダウンロード
        get(userRef).then((snapshot) => {
            if (snapshot.exists()) {
                const data = snapshot.val();
                localStorage.setItem('chaosPoint', data.cp ?? 0);
                localStorage.setItem('creatorMileage', data.cm ?? 0);
                localStorage.setItem('userAvatar', data.avatar ?? '👤');
            } else {
                update(userRef, {
                    name: userName,
                    cp: parseInt(localStorage.getItem('chaosPoint')) || 0,
                    cm: parseInt(localStorage.getItem('creatorMileage')) || 0,
                    avatar: localStorage.getItem('userAvatar') || '👤'
                });
            }
            document.getElementById('display-cp').innerText = localStorage.getItem('chaosPoint') || 0;
            document.getElementById('display-cm').innerText = localStorage.getItem('creatorMileage') || 0;
            document.getElementById('user-avatar').innerText = localStorage.getItem('userAvatar') || '👤';
        }).catch((error) => {
            console.error("ユーザーデータ同期エラー：", error);
            document.getElementById('display-cp').innerText = localStorage.getItem('chaosPoint') || 0;
            document.getElementById('display-cm').innerText = localStorage.getItem('creatorMileage') || 0;
            document.getElementById('user-avatar').innerText = localStorage.getItem('userAvatar') || '👤';
        });

        // アバター制御
        window.openAvatarModal = function() { document.getElementById('avatar-modal').style.display = 'flex'; };
        window.closeAvatarModal = function() { document.getElementById('avatar-modal').style.display = 'none'; };
        window.setAvatar = function(emoji) {
            localStorage.setItem('userAvatar', emoji);
            document.getElementById('user-avatar').innerText = emoji;
            closeAvatarModal();
            update(userRef, { avatar: emoji }); 
        };

        // 削除機能
        window.deleteDiag = function(diagId, title) {
            if (confirm(`本当に「${title}」をこの世から抹消するべか？\n（この操作は取り消せないべ！）`)) {
                const diagRef = ref(db, 'diagnoses/' + diagId);
                remove(diagRef).then(() => {
                    alert("クラウドから正常に削除完了したべ！🧹");
                }).catch((error) => {
                    alert("削除に失敗したべw: " + error);
                });
            }
        };

        // 修正モーダル起動（古いDB構造の互換性対応済み）
        window.openEditModal = function(diagId) {
            if (window.myDiagnosesData && window.myDiagnosesData[diagId]) {
                const diag = window.myDiagnosesData[diagId];
                document.getElementById('edit-id').value = diagId;
                document.getElementById('edit-title').value = diag.title || '';
                document.getElementById('edit-desc').value = diag.desc || '';
                
                // もし古い仕様（resultPattern）で作られたデータだった場合のフォールバック処理
                if (diag.baseText !== undefined) {
                    document.getElementById('edit-base').value = diag.baseText;
                    document.getElementById('edit-result-list').value = diag.resultList;
                } else {
                    document.getElementById('edit-base').value = "[name]の診断結果は...【[結果]】です！"; // 仮のベース
                    document.getElementById('edit-result-list').value = diag.resultPattern || '';
                }
                
                document.getElementById('edit-modal').style.display = 'flex';
            }
        };

        window.closeEditModal = function() {
            document.getElementById('edit-modal').style.display = 'none';
        };

        // 修正保存機能（新スキーマに対応）
        window.saveEdit = function() {
            const diagId = document.getElementById('edit-id').value;
            const newTitle = document.getElementById('edit-title').value;
            const newDesc = document.getElementById('edit-desc').value;
            const newBase = document.getElementById('edit-base').value;
            const newList = document.getElementById('edit-result-list').value;

            if (newTitle.trim() === "" || newBase.trim() === "" || newList.trim() === "") {
                alert("タイトル・基本テキスト・結果リストは空欄にできないべ！");
                return;
            }

            const diagRef = ref(db, 'diagnoses/' + diagId);
            update(diagRef, {
                title: newTitle,
                desc: newDesc,
                baseText: newBase,
                resultList: newList,
                resultPattern: null, // 古いデータ形式のキーがあればクラウドから消去（整理）
                updatedAt: new Date().toISOString()
            }).then(() => {
                alert("診断の改変（アップデート）が正常に完了したべ！✨");
                closeEditModal();
            }).catch((error) => {
                alert("修正データの送信に失敗したべw: " + error);
            });
        };

        // Firebaseから「自分が作った診断」だけをリアルタイム抽出
        const diagListRef = ref(db, 'diagnoses');
        onValue(diagListRef, (snapshot) => {
            const container = document.getElementById('diagnoses-container');
            container.innerHTML = ''; 

            if (snapshot.exists()) {
                const data = snapshot.val();
                window.myDiagnosesData = data; 

                const myDiagKeys = Object.keys(data).filter(key => data[key].authorId === userId);

                if (myDiagKeys.length > 0) {
                    myDiagKeys.forEach(key => {
                        const diag = data[key];
                        const item = document.createElement('div');
                        item.className = 'diag-item';
                        
                        const safeTitle = diag.title.replace(/</g, "&lt;").replace(/>/g, "&gt;");
                        const safeDesc = diag.desc.replace(/</g, "&lt;").replace(/>/g, "&gt;");

                        item.innerHTML = `
                            <div class="diag-info">
                                <h4 class="diag-title">${safeTitle}</h4>
                                <p class="diag-desc">${safeDesc}</p>
                            </div>
                            <div class="btn-area">
                                <button class="btn-edit" onclick="openEditModal('${key}')">📝 修正</button>
                                <button class="btn-delete" onclick="deleteDiag('${key}', '${safeTitle}')">🧹 削除</button>
                            </div>
                        `;
                        container.appendChild(item);
                    });
                } else {
                    container.innerHTML = `<div style="text-align: center; color: #555; padding: 20px;">まだ何も創造していないべ。アトリエで作ってくるべ！</div>`;
                }
            } else {
                container.innerHTML = `<div style="text-align: center; color: #555; padding: 20px;">パーク内に診断データが1つもないべ。</div>`;
            }
        });
    </script>
</body>
</html>
