<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>G-Chaospark | ノーパンツ・ゲーム</title>
</head>
<body>
<div id="nopants-game-box" style="text-align: center; font-family: sans-serif; padding: 20px; background: #f0f8ff; border: 3px solid #4169e1; border-radius: 15px; max-width: 440px; margin: 20px auto; box-shadow: 0px 4px 15px rgba(0,0,0,0.08);">
  <h2 style="color: #4169e1; font-size: 1.2rem; margin: 0;">🩲 ノーパンツ・ゲーム オンライン版</h2>
  
  <div id="setup-screen" style="margin: 20px 0;">
    <p style="font-weight: bold; color: #555;">ようこそ、<span id="display-username" style="color: #ff1493;"></span> だべ！</p>
    <button onclick="startGame('online')" style="padding: 15px 30px; background: #ff4500; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">🌐 世界の変態と対戦 (オンライン)</button>
  </div>

  <div id="game-screen" style="display: none;">
    <div id="room-users-log" style="text-align: left; background: #fff; padding: 10px; border-radius: 8px; border: 1px solid #4169e1; font-size: 0.9rem; margin-bottom: 15px;"></div>
    
    <div id="action-buttons-area">
      <button onclick="userSelect(true)" style="padding: 10px 20px; background: #ff69b4; border:none; color:white; border-radius:5px;">入ってる👖</button>
      <button onclick="userSelect(false)" style="padding: 10px 20px; background: #4ae; border:none; color:white; border-radius:5px;">ノーパンツ🚫</button>
    </div>

    <div style="margin-top:20px;">
        <button onclick="emergencyExit()" style="padding: 10px; background: #ffcc00; border:none; font-weight:bold; cursor:pointer;">⚠️ 親フラ・緊急免除ボタン</button>
        <p style="font-size:0.7rem; color:#666;">残り免除回数: <span id="fla-count">15</span> 回<br>(超えると-10P)</p>
    </div>
  </div>
</div>

<script>
let roomPlayers = [
  { name: localStorage.getItem('userName'), isNPC: false, score: 0, hasAnswered: false, choice: null, isDisconnected: false },
  { name: "NPC_A", isNPC: true, score: 0, hasAnswered: false, choice: null, isDisconnected: false },
  { name: "NPC_B", isNPC: true, score: 0, hasAnswered: false, choice: null, isDisconnected: false }
];

// --- 設定の更新 ---
let flaCount = 15; // 免除回数を15回に修正

let matchWaitTimer = null;

// 3分待機後にNPCを強制参加させる処理
function startMatchTimer() {
    matchWaitTimer = setTimeout(() => {
        alert("人数が集まらなかったべ！NPCが参戦するべ！");
        roomPlayers.forEach(p => p.isNPC = true);
        initRound();
    }, 180000); 
}

// ユーザーが切断した場合
function simulateDisconnect() {
    roomPlayers[0].isDisconnected = true;
    roomPlayers[0].score = 0; // ポイント没収
    alert("通信が切断されたべ！ポイント没収だべ！");
}

// --- 親フラ・緊急回避ロジック ---
function emergencyExit() {
    if(flaCount > 0) {
        flaCount--;
        alert("親フラ回避だべ！残り" + flaCount + "回だべ！");
    } else {
        // 16回目以降は -10P 没収に修正
        let cp = parseInt(localStorage.getItem('chaosPoint')) || 0;
        localStorage.setItem('chaosPoint', Math.max(0, cp - 10));
        alert("免除回数切れだべ！ペナルティとして -10P 没収するべ！");
    }
    document.getElementById('fla-count').innerText = flaCount;
}

// 毎ターンNPCが回答する処理
function npcLogic(player) {
    if(player.isNPC || player.isDisconnected) {
        player.hasAnswered = true;
        player.choice = Math.random() < 0.5;
    }
}

function startGame(mode) {
    document.getElementById("setup-screen").style.display = "none";
    document.getElementById("game-screen").style.display = "block";
    startMatchTimer();
    initRound();
}

function initRound() {
    roomPlayers.forEach(npcLogic);
    // ...以降のゲーム進行ロジック
}
</script>
</body>
</html>
