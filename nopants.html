<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>G-Chaospark | ノーパンツ・ゲーム</title>
</head>
<body>
<div id="nopants-game-box" style="text-align: center; font-family: sans-serif; padding: 20px; background: #f0f8ff; border: 3px solid #4169e1; border-radius: 15px; max-width: 440px; margin: 20px auto; box-shadow: 0px 4px 15px rgba(0,0,0,0.08);">
  <h2 style="color: #4169e1; font-size: 1.2rem; margin: 0;">🩲 ノーパンツ・ゲーム 完全版</h2>
  
  <div id="setup-screen" style="margin: 20px 0;">
    <p style="font-weight: bold; color: #555;">ようこそ、<span id="display-username" style="color: #ff1493;"></span> だべ！</p>
    <div style="display: flex; flex-direction: column; gap: 10px; align-items: center;">
        <button onclick="startGame('solo')" style="width: 85%; padding: 12px; background: #1e90ff; color: white; border: none; border-radius: 5px; cursor: pointer;">🆚 ソロ特訓</button>
        <button onclick="startGame('npc6')" style="width: 85%; padding: 12px; background: #9370DB; color: white; border: none; border-radius: 5px; cursor: pointer;">🤖 NPC乱戦</button>
        <button onclick="startGame('online')" style="width: 85%; padding: 12px; background: #ff4500; color: white; border: none; border-radius: 5px; cursor: pointer;">🌐 オンライン対戦</button>
    </div>
  </div>

  <div id="game-screen" style="display: none;">
    <div id="status-display" style="color: #d14; font-weight: bold; margin-bottom: 10px;">待機中...</div>
    <div id="room-users-log" style="text-align: left; background: #fff; padding: 10px; border-radius: 8px; border: 1px solid #4169e1; margin-bottom: 15px;"></div>
    
    <div id="action-buttons-area">
      <button onclick="userSelect(true)" style="padding: 10px 20px; background: #ff69b4; border:none; color:white; border-radius:5px;">入ってる👖</button>
      <button onclick="userSelect(false)" style="padding: 10px 20px; background: #4ae; border:none; color:white; border-radius:5px;">ノーパンツ🚫</button>
    </div>

    <div style="margin-top:20px;">
        <button onclick="emergencyExit()" style="padding: 10px; background: #ffcc00; border:none; font-weight:bold; cursor:pointer;">⚠️ 親フラ・緊急免除ボタン</button>
        <p style="font-size:0.7rem; color:#666;">残り免除: <span id="fla-count">15</span> 回 (超えると-10P)</p>
    </div>
    
    <button onclick="window.location.href='gamebooth.html'" style="margin-top:20px; padding: 8px; background: #555; color: #fff; border: none; border-radius: 5px;">🏠 ブースへ帰る</button>
  </div>
</div>

<script>
let roomPlayers = [
  { name: localStorage.getItem('userName') || "ゲスト", isNPC: false, score: 0, hasAnswered: false, choice: null, isDisconnected: false }
];
let flaCount = 15;
let matchWaitTimer = null;

function startGame(mode) {
    document.getElementById("setup-screen").style.display = "none";
    document.getElementById("game-screen").style.display = "block";
    
    if (mode === 'online') {
        let timeLeft = 180; // 3分
        document.getElementById("status-display").innerText = "人数待機中...残り: " + timeLeft + "秒";
        
        matchWaitTimer = setInterval(() => {
            timeLeft--;
            document.getElementById("status-display").innerText = "人数待機中...残り: " + timeLeft + "秒";
            if(timeLeft <= 0) {
                clearInterval(matchWaitTimer);
                document.getElementById("status-display").innerText = "時間切れ！NPCが参戦するべ！";
                // ここでNPCを2人追加して開始
                roomPlayers.push({name: "NPC_A", isNPC: true, score:0}, {name: "NPC_B", isNPC: true, score:0});
            }
        }, 1000);
    } else {
        document.getElementById("status-display").innerText = mode === 'solo' ? "ソロ特訓中" : "NPC乱戦中";
    }
    initRound();
}

function emergencyExit() {
    if(flaCount > 0) {
        flaCount--;
        alert("親フラ回避だべ！残り" + flaCount + "回だべ！");
    } else {
        alert("免除回数切れ！-10P没収だべ！");
    }
    document.getElementById('fla-count').innerText = flaCount;
}

function userSelect(guess) {
    roomPlayers[0].hasAnswered = true;
    roomPlayers[0].choice = guess;
    alert("回答したべ！");
}

function initRound() { /* ゲーム進行ロジック */ }
</script>
</body>
</html>
