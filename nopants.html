<div id="multi-panic-buttons" style="margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px;">
    <button id="oya-fla-btn" onclick="emergencyExit()" style="display:none; padding: 10px; background: #ffcc00; border:none; font-weight:bold; cursor:pointer;">⚠️ 親フラ・緊急免除ボタン (残り:<span id="fla-count">15</span>回)</button>
    <div style="display:flex; justify-content:center; gap:10px;">
        <button onclick="simulateDisconnect()" style="padding: 6px 12px; font-size: 0.8rem; background: #555; color: #fff; border: none; border-radius: 4px; cursor: pointer;">⚠️ 悪質切断(失格) 📡❌</button>
        <button onclick="userResign()" style="padding: 6px 12px; font-size: 0.8rem; background: #aaa; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">🏳️ 離脱する(親フラ) w</button>
    </div>
</div>

<script>
// --- 追加設定 ---
let flaCount = 15; // 免除回数
let onlineWaitTimer = null;

// --- 拡張機能ロジック ---
function startGame(mode) {
    gameMode = mode; 
    document.getElementById("setup-screen").style.display = "none";
    document.getElementById("game-screen").style.display = "block";
    
    if (gameMode === "online") {
        document.getElementById("oya-fla-btn").style.display = "block";
        // 3分待機後にNPCが自動参戦する処理
        setTimeout(() => {
            if(roomPlayers.some(p => p.isNPC && p.hasAnswered === false)) {
                alert("3分経過！NPCが強制対応するべ！");
            }
        }, 180000);
    }
    initRound();
}

// 親フラ緊急免除
function emergencyExit() {
    if(flaCount > 0) {
        flaCount--;
        alert("親フラ回避！残り" + flaCount + "回だべ！");
    } else {
        let currentScore = roomPlayers[0].score;
        roomPlayers[0].score = Math.max(0, currentScore - 50); // -50P
        alert("免除回数切れ！ペナルティで-50Pだべ！");
    }
    document.getElementById('fla-count').innerText = flaCount;
    updateRoomLog();
}

// 既存のsimulateDisconnectを上書き(切断ペナルティ強化)
function simulateDisconnect() {
    if (gameMode !== "online") return;
    roomPlayers[0].isDisconnected = true;
    roomPlayers[0].score = 0; // ポイント没収
    alert("切断によりポイント没収！NPCが代行するべ！");
    handleEarlyExit();
}

// NPC代行ロジック (切断時やNPC参加時に自動呼び出し)
function autoFillNPC() {
    roomPlayers.forEach(p => {
        if((p.isDisconnected || p.isNPC) && !p.hasAnswered) {
            p.hasAnswered = true;
            p.choice = Math.random() < 0.5;
        }
    });
}

// initRoundの冒頭で自動NPC代行を仕込む
const originalInitRound = initRound;
initRound = function() {
    if(gameMode === "online") autoFillNPC();
    originalInitRound();
}
</script>
