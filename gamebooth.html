<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>G-Chaospark | ノーパンツ・ゲーム</title>
    <style>
        body { margin: 0; background: #0a0a0a; color: #fff; font-family: 'Courier New', monospace; text-align: center; padding: 50px; }
        .box-container { display: flex; justify-content: center; gap: 20px; margin-top: 40px; }
        .box { width: 100px; height: 100px; background: #333; border: 2px solid #ff00ff; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 40px; transition: 0.2s; }
        .box:hover { background: #ff00ff; color: #000; transform: scale(1.1); }
        .back-btn { display: inline-block; margin-top: 50px; padding: 10px 20px; border: 1px solid #00e5ff; color: #00e5ff; text-decoration: none; }
    </style>
</head>
<body>
    <h1 style="color: #ff00ff;">ノーパンツ・ゲーム</h1>
    <p>参加費：10 CP<br>理性を捨てて箱を選べ！「パンツ」が入っていなければ勝利（20 CP獲得）だべ！</p>
    <h2 style="color: #00ff41;">所持CP: <span id="cp-display"></span></h2>

    <div class="box-container">
        <div class="box" onclick="playGame()">📦</div>
        <div class="box" onclick="playGame()">📦</div>
        <div class="box" onclick="playGame()">📦</div>
    </div>
    <div id="result" style="font-size: 24px; margin-top: 30px; font-weight: bold;"></div>

    <a href="gamebooth.html" class="back-btn">▶ ブースへ戻る</a>

    <script>
        function updateCP() {
            document.getElementById('cp-display').innerText = localStorage.getItem('chaosPoint') || 0;
        }
        updateCP();

        function playGame() {
            let cp = parseInt(localStorage.getItem('chaosPoint')) || 0;
            if (cp < 10) {
                alert("CPが足りないべ！出直してこい！");
                return;
            }

            // 参加費没収
            cp -= 10;
            
            const isWin = Math.random() > 0.5; // 50%の確率
            const resultDiv = document.getElementById('result');

            if (isWin) {
                cp += 20;
                resultDiv.innerHTML = "<span style='color: #00ff41;'>大成功！ノーパンツだべッ！！ (+20 CP) 🩲🚫</span>";
            } else {
                resultDiv.innerHTML = "<span style='color: #ff003c;'>失敗！パンツを穿いてしまったべ... (-10 CP) 👖</span>";
            }

            localStorage.setItem('chaosPoint', cp);
            updateCP();
        }
    </script>
</body>
</html>
