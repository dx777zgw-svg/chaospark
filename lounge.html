<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>G-Chaos Park | メインラウンジ</title>
    <style>
        /* モバイルファーストの基礎リセット */
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; background-color: #0a0a0a; color: #d1d1d1; font-family: 'Helvetica Neue', Arial, sans-serif; line-height: 1.6; }
        
        /* ヘッダー：AKARIが抜けた分、タイトルをスタイリッシュに配置 */
        header { background: #111; border-bottom: 2px solid #ff00ff; padding: 12px 15px; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; }
        .app-title { font-size: 1.2rem; font-weight: bold; color: #fff; margin: 0; letter-spacing: 1px; }
        .app-title span { color: #ff00ff; }

        /* マイページボタン */
        .mypage-btn { background: #222; color: #00ff00; border: 1px solid #00ff00; padding: 6px 12px; border-radius: 20px; text-decoration: none; font-size: 0.85rem; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        .mypage-btn:active { background: #00ff00; color: #000; }

        /* メインコンテナ（下部にフローティングAKARI用の余白を確保） */
        .container { max-width: 900px; margin: 10px auto; padding: 0 10px 100px 10px; display: flex; flex-direction: column; gap: 15px; }

        /* 💬 雑談ルーム */
        .section-box { background: #1a1a1a; border: 1px solid #333; padding: 10px; border-radius: 8px; }
        .section-title { color: #fff; border-bottom: 1px solid #ff00ff; padding-bottom: 5px; margin-top: 0; margin-bottom: 10px; font-size: 1rem; display: flex; align-items: center; gap: 8px; }
        
        .chat-container { display: flex; flex-direction: column; height: 35vh; }
        .chat-room { flex-grow: 1; background: #000; border: 1px inset #555; border-radius: 5px; padding: 10px; overflow-y: auto; margin-bottom: 10px; font-family: monospace; font-size: 0.85rem; }
        .chat-input-area { display: flex; gap: 8px; }
        .chat-input { flex-grow: 1; padding: 10px; background: #222; border: 1px solid #555; color: #fff; border-radius: 5px; font-size: 16px; }
        .chat-btn { padding: 10px 15px; background: #ff00ff; color: #fff; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; font-size: 0.9rem; white-space: nowrap; }

        /* 📱 アプリ風メニューグリッド */
        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .menu-card { background: #222; border: 1px solid; border-radius: 8px; padding: 15px 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-decoration: none; color: #fff; transition: background 0.2s; min-height: 80px; text-align: center; }
        .menu-card:active { background: rgba(255,255,255,0.1); }
        .menu-icon { font-size: 1.8rem; margin-bottom: 5px; }
        .menu-title { font-size: 0.85rem; font-weight: bold; }
        .menu-subtitle { font-size: 0.65rem; color: #aaa; margin-top: 2px; }

        .border-pink { border-color: #ff00ff; color: #ff00ff; }
        .border-orange { border-color: #ff9900; color: #ff9900; }
        .border-cyan { border-color: #00ffff; color: #00ffff; }
        .border-yellow { border-color: #ffff00; color: #ffff00; }
        .border-gray { border-color: #888; color: #ccc; }

        /* 💡 AKARI フローティングウィジェット（左側余白配置） */
        .akari-floating { position: fixed; bottom: 20px; left: 15px; z-index: 999; display: flex; flex-direction: column; align-items: flex-start; gap: 8px; pointer-events: none; }
        .akari-floating > * { pointer-events: auto; /* 中身はタップ可能 */ }
        
        .akari-speech { background: rgba(0, 0, 0, 0.85); border: 2px solid #ff00ff; padding: 10px 15px; border-radius: 15px; font-size: 0.85rem; color: #fff; animation: floatBounce 3s infinite; max-width: 200px; box-shadow: 0 0 10px rgba(255,0,255,0.4); position: relative; margin-left: 10px; }
        /* 吹き出しのしっぽ */
        .akari-speech::after { content: ''; position: absolute; bottom: -10px; left: 15px; border-width: 10px 10px 0 0; border-style: solid; border-color: #ff00ff transparent transparent transparent; }
        
        .akari-img { width: 60px; height: 60px; border: 2px solid #00ff00; border-radius: 50%; object-fit: cover; background: #333; box-shadow: 0 0 10px rgba(0,255,0,0.3); }
        .akari-fallback { width: 60px; height: 60px; background: #333; border: 2px solid #00ff00; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; color: #00ff00; font-size: 0.8rem; box-shadow: 0 0 10px rgba(0,255,0,0.3); }

        @keyframes floatBounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }

        /* PC等で画面が広い場合は、コンテナの左外側の完全な余白に配置 */
        @media (min-width: 1050px) {
            .akari-floating { left: calc(50% - 480px); bottom: 50px; }
            .akari-img, .akari-fallback { width: 80px; height: 80px; font-size: 1rem; }
            .akari-speech { font-size: 1rem; max-width: 250px; }
        }

    </style>
</head>
<body>

    <header>
        <h1 class="app-title">G-Chaos <span>Park</span></h1>
        <div class="header-right">
            <a href="mypage.html" class="mypage-btn">👤 マイページ</a>
        </div>
    </header>

    <div class="container">
        
        <!-- 💬 雑談ルーム -->
        <div class="section-box">
            <h2 class="section-title">💬 雑談ルーム</h2>
            <div class="chat-container">
                <div class="chat-room" id="chat-display">
                    <div style="color: #888;">[System] 雑談ルームに接続しました。</div>
                    <div style="color: #ff00ff;">[AKARI] ここは自由帳だよ！適当に喋ってこー！</div>
                </div>
                <div class="chat-input-area">
                    <input type="text" id="chat-input" class="chat-input" placeholder="メッセージ...">
                    <button class="chat-btn" onclick="dummySend()">送信</button>
                </div>
            </div>
        </div>

        <!-- 📱 メニューグリッド -->
        <div class="menu-grid">
            <a href="diagnosis.html" class="menu-card border-pink">
                <span class="menu-icon">🧠</span>
                <span class="menu-title" style="color:#fff;">診断製作所</span>
                <span class="menu-subtitle">脳内イメージ診断</span>
            </a>
            
            <a href="story_booth.html" class="menu-card border-orange">
                <span class="menu-icon">✍️</span>
                <span class="menu-title" style="color:#fff;">物書き</span>
                <span class="menu-subtitle">1000文字ストーリー</span>
            </a>

            <a href="game.html" class="menu-card border-cyan">
                <span class="menu-icon">🎮</span>
                <span class="menu-title" style="color:#fff;">ゲームブース</span>
                <span class="menu-subtitle">遊技場（準備中）</span>
            </a>

            <a href="ranking.html" class="menu-card border-yellow">
                <span class="menu-icon">🏆</span>
                <span class="menu-title" style="color:#fff;">各種ランキング</span>
                <span class="menu-subtitle">ステータスボード</span>
            </a>

            <a href="notice.html" class="menu-card border-gray">
                <span class="menu-icon">📢</span>
                <span class="menu-title" style="color:#fff;">お知らせ</span>
                <span class="menu-subtitle">運営から</span>
            </a>

            <a href="https://forms.google.com/your-form-link" target="_blank" class="menu-card border-gray">
                <span class="menu-icon">🛠️</span>
                <span class="menu-title" style="color:#fff;">お問い合わせ</span>
                <span class="menu-subtitle">不具合・ご意見</span>
            </a>
        </div>
    </div>

    <!-- 💡 AKARI ウィジェット（ボディの直下に配置） -->
    <div class="akari-floating">
        <div class="akari-speech" id="akari-text">ヤッホー！</div>
        <img src="AKARI.png" alt="AKARI" class="akari-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
        <div class="akari-fallback" style="display:none;">AKARI</div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const userName = localStorage.getItem('userName');
            if(!userName) {
                window.location.href = 'index.html';
            }

            // AKARIのランダムセリフ
            const akariQuotes = [
                "ヤッホー！楽しんでる？",
                "今日もカオスだね！",
                "なんか面白いことない？",
                "ルールは守ってねっ！"
            ];
            setInterval(() => {
                const randomQuote = akariQuotes[Math.floor(Math.random() * akariQuotes.length)];
                document.getElementById('akari-text').innerText = randomQuote;
            }, 8000); 
        });

        function dummySend() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if(!text) return;

            const userName = localStorage.getItem('userName') || 'ゲスト';
            const chatDisplay = document.getElementById('chat-display');
            
            const msgDiv = document.createElement('div');
            msgDiv.style.marginBottom = "5px";
            msgDiv.innerHTML = `<strong style="color:#00ff00;">[${userName}]</strong> ${text}`;
            chatDisplay.appendChild(msgDiv);
            
            input.value = '';
            chatDisplay.scrollTop = chatDisplay.scrollHeight;
        }

        document.getElementById('chat-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                dummySend();
            }
        });
    </script>
</body>
</html>
