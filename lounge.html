<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>G-Chaos Park | メインラウンジ</title>
    <style>
        /* モバイルファーストの基礎リセット */
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; background-color: #0a0a0a; color: #d1d1d1; font-family: 'Helvetica Neue', Arial, sans-serif; line-height: 1.6; }
        
        /* ヘッダー：スマホでも見やすい固定ヘッダー */
        header { background: #111; border-bottom: 2px solid #ff00ff; padding: 10px 15px; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; }
        .akari-container { display: flex; align-items: center; gap: 10px; }
        .akari-icon { width: 40px; height: 40px; background: #333; border: 2px solid #00ff00; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; color: #00ff00; font-size: 0.7rem; }
        .akari-speech { background: rgba(255, 0, 255, 0.2); border: 1px solid #ff00ff; padding: 5px 10px; border-radius: 15px; font-size: 0.8rem; color: #fff; animation: bounce 2s infinite; max-width: 150px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }

        /* メインコンテナ */
        .container { max-width: 900px; margin: 15px auto; padding: 0 10px; display: flex; flex-direction: column; gap: 20px; }

        /* セクション共通 */
        .section-box { background: #1a1a1a; border: 1px solid #333; padding: 15px; border-radius: 8px; }
        .section-title { color: #fff; border-bottom: 1px solid #ff00ff; padding-bottom: 8px; margin-top: 0; margin-bottom: 15px; font-size: 1.1rem; display: flex; align-items: center; gap: 8px; }

        /* 💬 雑談ルーム（スマホ特化レイアウト） */
        .chat-container { display: flex; flex-direction: column; height: 50vh; /* スマホ画面の半分をチャットに割く */ }
        .chat-room { flex-grow: 1; background: #000; border: 1px inset #555; border-radius: 5px; padding: 10px; overflow-y: auto; margin-bottom: 10px; font-family: monospace; font-size: 0.9rem; }
        .chat-input-area { display: flex; gap: 8px; }
        /* font-size: 16px; はiOSで入力時にズームされるのを防ぐ必須テクニック */
        .chat-input { flex-grow: 1; padding: 12px; background: #222; border: 1px solid #555; color: #fff; border-radius: 5px; font-size: 16px; }
        .chat-btn { padding: 12px 15px; background: #ff00ff; color: #fff; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; font-size: 1rem; white-space: nowrap; }
        .chat-btn:hover { background: #d100d1; }

        /* ✨ クリエーション＆各種リンク（タップしやすい親指サイズ） */
        .link-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
        .link-btn { display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 15px; background: #222; color: #00ff00; text-decoration: none; border: 1px solid #00ff00; border-radius: 8px; text-align: center; font-weight: bold; transition: background 0.2s; min-height: 60px; }
        .link-btn:active { background: #00ff00; color: #000; }
        .link-desc { font-size: 0.75rem; color: #aaa; margin-top: 4px; font-weight: normal; }

        /* フッター */
        footer { background: #111; border-top: 1px solid #333; text-align: center; padding: 20px 10px; margin-top: 30px; }
        .support-link { color: #ff00ff; text-decoration: none; font-size: 0.9rem; display: block; padding: 10px; border: 1px solid #ff00ff; border-radius: 5px; margin: 0 auto 15px; max-width: 300px; }
    </style>
</head>
<body>

    <header>
        <div class="akari-container">
            <div class="akari-icon">AKARI</div>
            <div class="akari-speech" id="akari-text">ヤッホー！</div>
        </div>
        <div style="font-size: 0.8rem; text-align: right;">
            <span style="color:#888;">ID:</span><br>
            <span id="user-display-name" style="color:#00ff00; font-weight:bold;">ゲスト</span>
        </div>
    </header>

    <div class="container">
        <div class="section-box">
            <h2 class="section-title">💬 メイン雑談ルーム</h2>
            <div class="chat-container">
                <div class="chat-room" id="chat-display">
                    <div style="color: #888;">[System] 雑談ルームに接続しました。</div>
                    <div style="color: #ff00ff;">[AKARI] ここは自由帳だよ！適当に喋ってこー！</div>
                </div>
                <div class="chat-input-area">
                    <input type="text" id="chat-input" class="chat-input" placeholder="メッセージを入力...">
                    <button class="chat-btn" onclick="dummySend()">送信</button>
                </div>
            </div>
        </div>

        <div class="section-box">
            <h2 class="section-title">✨ クリエーション</h2>
            <ul class="link-list">
                <li>
                    <a href="diagnosis.html" class="link-btn">
                        <span style="font-size: 1.2rem;">🧠 脳内イメージ診断</span>
                        <span class="link-desc">あなたの精神状態を可視化（全5段階）</span>
                    </a>
                </li>
                <li>
                    <a href="story_booth.html" class="link-btn" style="border-color:#ff9900; color:#ff9900;">
                        <span style="font-size: 1.2rem;">✍️ 1000文字ストーリー</span>
                        <span class="link-desc">承認欲求を満たすショートストーリー投稿所</span>
                    </a>
                </li>
            </ul>
        </div>

        <div class="section-box">
            <h2 class="section-title">📌 お知らせ・各種案内</h2>
            <ul class="link-list">
                <li><a href="notice.html" class="link-btn" style="border-color:#555; color:#ddd; min-height:44px;">▶ 運営からのお知らせ</a></li>
                <li><a href="status.html" class="link-btn" style="border-color:#555; color:#ddd; min-height:44px;">▶ ステータスボード（準備中）</a></li>
                <li><a href="game.html" class="link-btn" style="border-color:#555; color:#ddd; min-height:44px;">▶ 遊技場（準備中）</a></li>
            </ul>
        </div>
    </div>

    <footer>
        <a href="https://forms.google.com/your-form-link" target="_blank" class="support-link">🛠️ 不具合・ご意見窓口</a>
        <p style="font-size: 0.8rem; color: #555; margin: 0;">&copy; G-Chaos Park</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const userName = localStorage.getItem('userName');
            if(userName) {
                document.getElementById('user-display-name').innerText = userName;
            } else {
                // IDがない場合はゲートへ強制送還
                window.location.href = 'index.html';
            }

            // AKARIのランダムセリフ
            const akariQuotes = [
                "ヤッホー！楽しんでる？",
                "今日もカオスだね！",
                "なんか面白いことない？",
                "ルールは守ってねっ！"
            ];
            setInterval(() => {
                const randomQuote = akariQuotes[Math.floor(Math.random() * akariQuotes.length)];
                document.getElementById('akari-text').innerText = randomQuote;
            }, 8000); // スマホ向けにテンポよく8秒に変更
        });

        // 雑談ルームのダミー送信処理
        function dummySend() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if(!text) return;

            const userName = localStorage.getItem('userName') || 'ゲスト';
            const chatDisplay = document.getElementById('chat-display');
            
            const msgDiv = document.createElement('div');
            msgDiv.style.marginBottom = "5px";
            msgDiv.innerHTML = `<strong style="color:#00ff00;">[${userName}]</strong> ${text}`;
            chatDisplay.appendChild(msgDiv);
            
            input.value = '';
            chatDisplay.scrollTop = chatDisplay.scrollHeight;
        }

        // エンターキーで送信できるようにする（スマホのキーボード対応）
        document.getElementById('chat-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                dummySend();
            }
        });
    </script>
</body>
</html>
