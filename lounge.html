<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>G-Chaospark | Main Lounge</title>
    <style>
        body { margin: 0; background: #0a0a0a; color: #d1d1d1; font-family: 'Courier New', Courier, monospace; height: 100vh; display: grid; grid-template-columns: 320px 1fr 300px; gap: 20px; padding: 20px; box-sizing: border-box; }
        
        /* エリア共通枠 */
        .panel { border: 1px solid #333; padding: 20px; background: #121212; }
        
        /* 左：AKARIエリア */
        #akari-zone { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; }
        #akari-move { width: 100%; animation: float 4s ease-in-out infinite; }
        #akari-speech { border: 1px solid #00ff41; color: #00ff41; padding: 15px; margin-top: 15px; width: 100%; text-align: center; }
        
        /* 真ん中：核エリア */
        #core-zone { display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px solid #00ff41; }
        
        /* 右： utilityエリア */
        #utility-zone { display: flex; flex-direction: column; gap: 15px; }
        
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        #legal-links { position: fixed; bottom: 10px; left: 15px; font-family: sans-serif; font-size: 11px; z-index: 100; }
        #legal-links a { color: #ffffff; text-decoration: none; margin-right: 15px; }
        #legal-links a:hover { text-decoration: underline; }

        /* マイページリンクの特別装飾 */
        #mypage-panel { border-color: #ffd700; text-align: center; background: #1a1a00; }
        #mypage-link { color: #ffd700; font-weight: bold; text-decoration: none; font-size: 1.1em; display: block; padding: 10px; }
        #mypage-link:hover { background: #333300; border-radius: 5px; }

        /* ミニゲームブースリンクの特別装飾 */
        #gamebooth-panel { border-color: #00e5ff; text-align: center; background: #001a1f; }
        #gamebooth-link { color: #00e5ff; font-weight: bold; text-decoration: none; font-size: 1.1em; display: block; padding: 10px; }
        #gamebooth-link:hover { background: #00333d; border-radius: 5px; }

        /* 闇の換金所リンクの特別装飾 */
        #exchange-panel { border-color: #ff003c; text-align: center; background: #1a0005; }
        #exchange-link { color: #ff003c; font-weight: bold; text-decoration: none; font-size: 1.1em; display: block; padding: 10px; }
        #exchange-link:hover { background: #33000a; border-radius: 5px; }

        /* 🌳 3Dカオスパークへの特別装飾（追加！） 🌳 */
        #park-panel { border-color: #32cd32; text-align: center; background: #002200; }
        #park-link { color: #32cd32; font-weight: bold; text-decoration: none; font-size: 1.2em; display: block; padding: 12px; }
        #park-link:hover { background: #004400; border-radius: 5px; transform: scale(1.02); transition: 0.2s; }

        /* ステータス（お財布）パネルの装飾 */
        #status-panel { border-color: #00ff41; background: #001a05; }
        .status-item { font-size: 1.1em; font-weight: bold; margin: 5px 0; }

        /* チュートリアルポップアップの装飾 */
        #tutorial-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); z-index: 9999; justify-content: center; align-items: center;
        }
        #tutorial-content {
            background: #121212; border: 2px solid #ff00ff; padding: 30px; text-align: center; border-radius: 10px; width: 400px;
        }
        .btn-neon {
            background: #ff00ff; color: #fff; border: none; padding: 12px 24px; font-size: 1.2em; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: 20px; width: 100%;
        }
        .btn-neon:hover { background: #cc00cc; }

        /* 制作所ボタンのホバーエフェクト */
        #start-btn:hover {
            background: #fff !important;
            transform: scale(1.05);
        }
    </style>
</head>
