<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-Chaos Park</title>
    <style>
        body { margin: 0; padding: 0; background-color: #000; }

        #gate-screen {
            margin: 0;
            height: 100vh;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('mon.png') no-repeat center center/cover;
            color: #fff;
            font-family: 'Arial', sans-serif;
            text-align: center;
        }
        #lico-container {
            position: fixed;
            bottom: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            z-index: 100;
            padding-left: 20px;
        }
        #lico-img { height: 60vh; filter: drop-shadow(0 0 10px rgba(255,0,255,0.5)); }
        #speech-bubble {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #ff00ff;
            color: #fff;
            padding: 20px;
            border-radius: 15px;
            width: 300px;
            margin-bottom: 20px;
            text-align: left;
        }
        .google-btn {
            background: #fff;
            color: #333;
            border: 2px solid #ccc;
            padding: 10px 15px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }
        .google-btn:hover { background: #f0f0f0; }
    </style>
</head>
<body>

    <div id="gate-screen">
        <h1>G-Chaos Park 入国開始手続きゲート</h1>
        <div id="lico-container">
            <img src="LICO.png" id="lico-img" onerror="this.style.display='none';">
            <div id="speech-bubble">
                <div id="lico-name" style="background:#ff00ff; padding:2px 10px; font-weight:bold;">Lico</div>
                <p id="lico-text">……ゲートへようこそ。入国には手続きが必要よ。</p>
                <div id="name-input-area" style="display:none;">
                    <button class="google-btn" onclick="loginWithGoogle()">
                        <span style="font-size:1.2rem; margin-right:8px;">🌐</span> Googleで手続きする
                    </button>
                </div>
                <button id="start-btn" onclick="startProcess()">手続きを開始する</button>
                
                <a href="terms.html" target="_blank" id="terms-link-btn" style="display:none; color:#ff00ff; font-weight:bold; cursor:pointer;" onclick="showCompleteBtn()">規約を確認する</a>
                
                <button id="complete-btn" style="display:none; margin-top:10px; background:#00ff00; color:#000; padding:10px; border:none; font-weight:bold; cursor:pointer;" onclick="completeImmigration()">確認した。入国する！</button>
            </div>
        </div>
    </div>

    <div id="volume-warning" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:10000; background:#000; display:flex; flex-direction:column; justify-content:center; align-items:center; color:#fff; text-align:center;">
        <p style="font-size: 1.5rem; color: #ff00ff; border: 1px solid #ff00ff; padding: 20px;">
            ⚠️ 警告：この先、音が出ます。<br>音量にご注意ください。
        </p>
        <button onclick="startExperience()" style="padding: 15px 30px; background:#ff00ff; color:#fff; border:none; cursor:pointer; font-size:1.2rem;">
            音量を確認して入国する
        </button>
    </div>

    <div id="opening-layer" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; background: #000;">
        <video id="op-video" width="100%" height="100%" playsinline onended="hideMovie()">
            <source src="opening.mp4" type="video/mp4">
        </video>
    </div>

    <script type="module">
        // Firebase本体と認証モジュールのインポート
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        // お前のFirebase設定
        const firebaseConfig = {
            apiKey: "AIzaSyCfmebBH61qeXPLbo-X5n2D7quDitXXIEA",
            authDomain: "g-chaospark.firebaseapp.com",
            databaseURL: "https://g-chaospark-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "g-chaospark",
            storageBucket: "g-chaospark.firebasestorage.app",
            messagingSenderId: "256664886136",
            appId: "1:256664886136:web:e87bbe307a654331c1468d"
        };

        // Firebaseの初期化
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // モジュール内で定義した関数をHTMLから呼べるようにwindowオブジェクトに登録
        window.startExperience = function() {
            document.getElementById('volume-warning').style.display = 'none';
            document.getElementById('opening-layer').style.display = 'block';
            const video = document.getElementById('op-video');
            video.muted = false; 
            video.play().catch(e => console.log("再生ブロックされたべ: " + e));
        }

        window.hideMovie = function() {
            document.getElementById('opening-layer').style.display = 'none';
            if (localStorage.getItem('userId')) {
                window.location.href = 'lounge.html';
                return;
            }
            document.getElementById('gate-screen').style.display = 'flex';
        }

        window.startProcess = function() {
            document.getElementById('lico-text').innerText = "はじめてみる顔ね！Googleの身分証を見せてくれる？";
            document.getElementById('start-btn').style.display = "none";
            document.getElementById('name-input-area').style.display = "block";
        }

        // 🌟 ここがGoogleログインの核だ！
        window.loginWithGoogle = function() {
            signInWithPopup(auth, provider).then((result) => {
                const user = result.user;
                
                // Googleから取得した名前と永続ID（UID）をローカルに保存
                localStorage.setItem('userName', user.displayName);
                localStorage.setItem('userId', user.uid); 
                
                // Licoのセリフ更新
                document.getElementById('lico-text').innerHTML = 
                    `${user.displayName}さんね！身分証の確認が取れたわ。<br>
                     これがあなたのパーマネントIDよ。<br>
                     <strong style="color:#00ff00; background:#222; padding:3px 8px; margin:8px 0; display:inline-block; font-size:1.1rem;">【 ${user.uid} 】</strong><br>
                     まずは規約を読んでくれる？`;
                     
                document.getElementById('name-input-area').style.display = "none";
                document.getElementById('terms-link-btn').style.display = "block";
                
            }).catch((error) => {
                console.error("ログインエラー:", error);
                alert("手続きに失敗したわ。もう一度試してね。");
            });
        }

        window.showCompleteBtn = function() {
            document.getElementById('lico-text').innerText = "確認できた？じゃあ、中へどうぞ。";
            document.getElementById('terms-link-btn').style.display = "none";
            document.getElementById('complete-btn').style.display = "block";
        }

        window.completeImmigration = function() {
            window.location.href = 'lounge.html';
        }
    </script>

</body>
</html>
