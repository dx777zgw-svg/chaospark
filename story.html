<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>G-Chaos Story | 執筆</title>
    <style>
        body { background: #ffffff; color: #1a1a1a; padding: 20px; font-family: sans-serif; }
        
        .nav-bar { display: flex; justify-content: space-between; margin-bottom: 20px; border-bottom: 2px solid #000; padding-bottom: 10px; }
        .nav-bar a { color: #000; text-decoration: none; font-weight: bold; font-size: 0.95rem; }

        h2 { color: #000; border-bottom: 2px solid #000; display: inline-block; margin-top: 0; }
        
        input, textarea { 
            width: 100%; background: #f9f9f9; border: 1px solid #ccc; color: #000; 
            padding: 15px; margin: 10px 0; border-radius: 8px; box-sizing: border-box; font-size: 16px;
        }
        textarea { height: 350px; resize: none; line-height: 1.6; }
        
        .status-area { display: flex; justify-content: space-between; font-size: 0.9rem; color: #666; margin-bottom: 10px; }
        #save-msg { color: #008800; font-weight: bold; opacity: 0; transition: opacity 0.5s; }
        
        .btn-group { display: flex; gap: 10px; }
        .btn-draft { flex: 1; padding: 15px; background: #eee; color: #000; border: 2px solid #ccc; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-post { flex: 2; padding: 15px; background: #000; color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        #error-msg { color: #cc0000; font-size: 0.85rem; margin-bottom: 10px; display: none; font-weight: bold; }
    </style>
</head>
<body>

    <nav class="nav-bar">
        <a href="story_list.html">📖 物語を読む</a>
        <a href="lounge.html">🏠 ラウンジへ</a>
    </nav>

    <h2>物語を紡ぐ</h2>
    
    <input type="text" id="title" placeholder="タイトル（30文字以内）" maxlength="30" oninput="autoSave()">
    <textarea id="body" placeholder="ここに100〜1000文字で物語を執筆..." oninput="autoSave(); updateCount();"></textarea>
    
    <div class="status-area">
        <span id="save-msg">✓ 下書き保存しました</span>
        <span id="counter">現在: 0 / 1000文字</span>
    </div>
    
    <div id="error-msg"></div>
    
    <div class="btn-group">
        <button class="btn-draft" onclick="manualSave()">一時保存</button>
        <button class="btn-post" onclick="postStory()">投稿する</button>
    </div>

    <script type="module">
        const titleInput = document.getElementById('title');
        const bodyInput = document.getElementById('body');
        const counter = document.getElementById('counter');
        const saveMsg = document.getElementById('save-msg');

        // ページ読み込み時に下書きを復元
        window.onload = () => {
            const draftTitle = localStorage.getItem('story_draft_title');
            const draftBody = localStorage.getItem('story_draft_body');
            
            if (draftTitle) titleInput.value = draftTitle;
            if (draftBody) {
                bodyInput.value = draftBody;
                updateCount();
            }
        };

        // 文字数カウント
        window.updateCount = () => {
            const len = bodyInput.value.length;
            counter.innerText = `現在: ${len} / 1000文字`;
            if(len < 100) counter.style.color = "#cc0000";
            else if(len > 1000) counter.style.color = "#ff0000";
            else counter.style.color = "#008800";
        };

        // オートセーブ（入力するたびに裏で保存）
        window.autoSave = () => {
            localStorage.setItem('story_draft_title', titleInput.value);
            localStorage.setItem('story_draft_body', bodyInput.value);
        };

        // 手動保存（安心感のための明示的な保存）
        window.manualSave = () => {
            autoSave();
            saveMsg.style.opacity = "1";
            setTimeout(() => { saveMsg.style.opacity = "0"; }, 2000);
        };

        window.postStory = async () => {
            const body = bodyInput.value;
            const error = document.getElementById('error-msg');
            
            if (body.length < 100 || body.length > 1000) {
                error.innerText = "本文は100〜1000文字で入力してください。";
                error.style.display = 'block';
                return;
            }
            if (/(.)\1{4,}/.test(body)) {
                error.innerText = "不適切な文字列が含まれています。";
                error.style.display = 'block';
                return;
            }

            alert("物語がパークに刻まれました！");
            
            // 投稿成功したら下書きを消去
            localStorage.removeItem('story_draft_title');
            localStorage.removeItem('story_draft_body');
            
            // window.location.href = 'story_list.html';
        };
    </script>
</body>
</html>
