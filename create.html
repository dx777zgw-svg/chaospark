<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>G-Chaospark | 診断アトリエ</title>
    <style>
        body { margin: 0; background: #0a0a0a; color: #d1d1d1; font-family: 'Courier New', monospace; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .atelier-box { background: #121212; border: 1px solid #333; padding: 30px; width: 100%; max-width: 600px; box-sizing: border-box; }
        h1 { color: #00ff41; text-align: center; border-bottom: 1px dashed #333; padding-bottom: 15px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #aaa; font-weight: bold; }
        input, textarea { width: 100%; background: #000; border: 1px solid #444; color: #fff; padding: 10px; box-sizing: border-box; }
        
        /* テンプレートボタンのスタイル */
        .template-btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .template-btn { background: #222; border: 1px solid #444; color: #00e5ff; padding: 10px; cursor: pointer; font-size: 0.8rem; }
        .template-btn:hover { background: #00e5ff; color: #000; }

        #publish-btn { width: 100%; background: #00ff41; color: #000; padding: 15px; font-size: 18px; font-weight: bold; cursor: pointer; border: none; margin-top: 20px; }
        .magic-box { background: #1a1a1a; border: 1px solid #00ff41; padding: 15px; margin-bottom: 20px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="atelier-box">
    <h1>[ 診断アトリエ ]</h1>

    <label>⚡ テンプレートを即時挿入</label>
    <div class="template-btn-group">
        <button class="template-btn" onclick="applyTemplate('fruit')">🍎 果物診断</button>
        <button class="template-btn" onclick="applyTemplate('weapon')">⚔️ 武器3つ</button>
        <button class="template-btn" onclick="applyTemplate('luck')">🔮 文書診断</button>
        <button class="template-btn" onclick="applyTemplate('prob')">🎰 確率診断</button>
    </div>

    <div class="magic-box">
        <label style="color: #00ff41;">🔢 数字リスト生成 (1-1000)</label>
        <div style="display: flex; gap: 10px; margin-top: 5px;">
            <input type="text" id="num-range" placeholder="例: 1-500">
            <button onclick="generateNumberList()" style="padding: 5px 15px; cursor: pointer;">生成</button>
        </div>
    </div>

    <div class="form-group">
        <label>タイトル</label>
        <input type="text" id="diag-title" placeholder="狂気のタイトル...">
    </div>
    <div class="form-group">
        <label>説明</label>
        <textarea id="diag-desc" placeholder="この診断の説明..."></textarea>
    </div>
    <div class="form-group">
        <label>結果（改行で区切る）</label>
        <textarea id="diag-result" placeholder="例：[名前]の戦闘力は[数字]！"></textarea>
    </div>

    <button id="publish-btn">システムに公開する</button>
</div>

<script type="module">
    // ... (Firebase初期化などはそのまま) ...
    
    // テンプレート適用ロジック
    window.applyTemplate = function(type) {
        const titleField = document.getElementById('diag-title');
        const descField = document.getElementById('diag-desc');
        const resultField = document.getElementById('diag-result');

        if(type === 'fruit') {
            titleField.value = "おすすめの果物診断";
            descField.value = "あなたに今必要な果物を診断します！";
            resultField.value = "リンゴ\nバナナ\nぶどう\nメロン";
        } else if(type === 'weapon') {
            titleField.value = "武器3つ診断";
            descField.value = "あなたが戦場で持つべき武器はこれだべ！";
            resultField.value = "剣\nピストル\n槍\n爆弾";
        } else if(type === 'luck') {
            titleField.value = "今日の運勢";
            descField.value = "あなたの未来を観測するべ...";
            resultField.value = "[名前]は明日、公園で推しと出会うでしょう";
        } else if(type === 'prob') {
            titleField.value = "推しと会える確率";
            descField.value = "どれくらいの確率か計算するべ！";
            resultField.value = "[名前]が推しと会える確率は [数字]% だべ！";
        }
    };

    // 数字生成機能
    window.generateNumberList = function() {
        const range = document.getElementById('num-range').value.split('-');
        if(range.length !== 2) return alert("例: 1-500 と入力だべ！");
        let list = "";
        for(let i = parseInt(range[0]); i <= parseInt(range[1]); i++) list += i + "\n";
        document.getElementById('diag-result').value = list.trim();
    };

    // 公開機能 (省略されているが、Firebaseのpush処理は以前のコードの通り)
</script>
</body>
</html>
