<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>G-Chaospark | 診断アトリエ</title>
    <style>
        body {
            margin: 0; background: #0a0a0a; color: #d1d1d1;
            font-family: 'Courier New', Courier, monospace; padding: 30px;
            display: flex; flex-direction: column; align-items: center;
        }
        
        .atelier-box {
            background: #121212; border: 1px solid #333; padding: 30px;
            width: 100%; max-width: 600px; box-sizing: border-box; position: relative;
        }

        h1 { color: #00ff41; text-align: center; margin-top: 0; border-bottom: 1px dashed #333; padding-bottom: 15px; }
        
        .status-header { display: flex; justify-content: space-between; margin-bottom: 20px; }
        
        .mileage-display {
            background: #1a1a1a; border-left: 4px solid #ffd700; color: #ffd700;
            padding: 10px; font-weight: bold; letter-spacing: 1px; flex: 1; margin-right: 10px;
        }

        .limit-display {
            background: #1a1a1a; border-left: 4px solid #00ff41; color: #00ff41;
            padding: 10px; font-weight: bold; letter-spacing: 1px; flex: 1; text-align: right;
        }
        
        .limit-reached { border-left-color: #ff003c !important; color: #ff003c !important; }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #aaa; font-weight: bold; }
        .required { color: #ff003c; font-size: 12px; margin-left: 5px; }
        
        input[type="text"], textarea {
            width: 100%; background: #000; border: 1px solid #444; color: #fff;
            padding: 10px; box-sizing: border-box; font-family: inherit; transition: 0.3s;
        }
        input[type="text"]:focus, textarea:focus { border-color: #00ff41; outline: none; }
        textarea { resize: vertical; height: 100px; }

        .tag-container { display: flex; gap: 10px; }
        .tag-container input { flex: 1; }

        #ng-warning {
            display: none; background: #ff003c; color: #fff; font-weight: bold;
            padding: 15px; margin-bottom: 20px; text-align: center; border-radius: 3px;
            animation: flash 1s infinite alternate;
        }
        @keyframes flash { from { opacity: 1; } to { opacity: 0.8; } }

        #publish-btn {
            width: 100%; background: transparent; color: #00ff41; border: 2px solid #00ff41;
            padding: 15px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        #publish-btn:hover:not(:disabled) { background: #00ff41; color: #000; }
        #publish-btn:disabled { border-color: #555; color: #555; cursor: not-allowed; background: #111; }

        #lock-overlay {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); flex-direction: column; align-items: center;
            justify-content: center; z-index: 10; border: 2px solid #ff003c; box-sizing: border-box;
        }
        #lock-overlay h2 { color: #ff003c; letter-spacing: 3px; text-align: center; }
        
        #cooldown-overlay {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); flex-direction: column; align-items: center;
            justify-content: center; z-index: 9; border: 2px solid #ffd700; box-sizing: border-box;
        }
        #cooldown-overlay h2 { color: #ffd700; letter-spacing: 3px; text-align: center; }
        #cooldown-overlay p { color: #aaa; text-align: center; }
        #timer-display { font-size: 32px; color: #fff; font-weight: bold; margin-top: 10px; font-family: monospace; }

        .back-link { display: block; text-align: center; margin-top: 20px; color: #444; text-decoration: none; font-weight: bold; }
        .back-link:hover { color: #00ff41; }
        .play-link { display: block; text-align: center; margin-top: 10px; color: #00e5ff; text-decoration: none; font-size: 1.2rem; font-weight: bold; border: 1px dashed #00e5ff; padding: 10px; }
        .play-link:hover { background: #00e5ff; color: #000; }
    </style>
</head>
<body>

    <script>
        if (!localStorage.getItem('userId')) {
            alert("Lico「ゲートを通ってから出直してきなさい！」");
            window.location.href = 'index.html';
        }
    </script>

    <div class="atelier-box" id="atelier-box">
        
        <div id="lock-overlay">
            <h2>[ ACCESS DENIED ]</h2>
            <p style="color: #aaa;">本日のシステム干渉枠（5回）を使い切ったべ。<br>明日また来るべ。</p>
        </div>

        <div id="cooldown-overlay">
            <h2>[ SYSTEM COOLING ]</h2>
            <p>連続干渉を防ぐため、回路を冷却中だべ。<br>他の診断をプレイして待つべ。</p>
            <div id="timer-display">10:00</div>
        </div>

        <h1>[ 診断アトリエ ]</h1>
        
        <div class="status-header">
            <div class="mileage-display">💎 マイレージ: <span id="mileage-val">0</span> pt</div>
            <div class="limit-display" id="limit-display">⏳ 残り制作枠: 5 回</div>
        </div>

        <div id="ng-warning">⚠️ 警告：システム規定に違反する単語（禁止ワード）を検知したべ！修正しろべ！</div>

        <div class="form-group">
            <label>診断タイトル<span class="required">(必須)</span></label>
            <input type="text" id="diag-title" class="check-ng" placeholder="狂気のタイトルを入力..." required>
        </div>

        <div class="form-group">
            <label>説明<span class="required">(必須)</span></label>
            <textarea id="diag-desc" class="check-ng" placeholder="この診断が何をもたらすのか説明しろべ..." required></textarea>
        </div>

        <div class="form-group">
            <label>結果のパターン<span class="required">(必須)</span></label>
            <textarea id="diag-result" class="check-ng" placeholder="例：[名前]の戦闘力は53万だべ！" required></textarea>
        </div>

        <div class="form-group">
            <label>タグ (最大3つまで任意)</label>
            <div class="tag-container">
                <input type="text" id="tag1" class="check-ng" placeholder="#タグ1">
                <input type="text" id="tag2" class="check-ng" placeholder="#タグ2">
                <input type="text" id="tag3" class="check-ng" placeholder="#タグ3">
            </div>
        </div>

        <button id="publish-btn" disabled>システムに公開する (+5 pt)</button>
    </div>

    <a href="play.html" class="play-link">👀 プレイエリア（観測地点）へ行く</a>
    <a href="lounge.html" class="back-link">▶ ラウンジへ戻る</a>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCfmebBH61qeXPLbo-X5n2D7quDitXXIEA",
            authDomain: "g-chaospark.firebaseapp.com",
            databaseURL: "https://g-chaospark-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "g-chaospark",
            storageBucket: "g-chaospark.firebasestorage.app",
            messagingSenderId: "256664886136",
            appId: "1:256664886136:web:e87bbe307a654331c1468d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const userName = localStorage.getItem('userName') || 'ゲスト作者';
        const userId = localStorage.getItem('userId');

        const bannedWords = ["死ね", "殺す", "犯罪", "爆破", "違法"];
        const inputs = document.querySelectorAll('.check-ng');
        const warningBox = document.getElementById('ng-warning');
        const publishBtn = document.getElementById('publish-btn');
        
        const MAX_POSTS = 5;
        const COOLDOWN_MS = 10 * 60 * 1000; 
        const today = new Date().toLocaleDateString();
        
        let savedDate = localStorage.getItem('lastPostDate');
        let postCount = parseInt(localStorage.getItem('postCount')) || 0;
        let lastPostTime = parseInt(localStorage.getItem('lastPostTime')) || 0; 
        
        let creatorMileage = parseInt(localStorage.getItem('creatorMileage')) || 0;
        document.getElementById('mileage-val').innerText = creatorMileage;

        if (savedDate !== today) {
            postCount = 0;
            localStorage.setItem('lastPostDate', today);
            localStorage.setItem('postCount', 0);
        }

        function updateUI() {
            const limitDisplay = document.getElementById('limit-display');
            limitDisplay.innerText = `⏳ 残り制作枠: ${MAX_POSTS - postCount} 回`;

            if (postCount >= MAX_POSTS) {
                document.getElementById('lock-overlay').style.display = 'flex';
                document.getElementById('cooldown-overlay').style.display = 'none';
                limitDisplay.classList.add('limit-reached');
                limitDisplay.innerText = `🚫 制限到達`;
                return;
            }

            const now = new Date().getTime();
            const timeDiff = now - lastPostTime;

            if (timeDiff < COOLDOWN_MS) {
                document.getElementById('cooldown-overlay').style.display = 'flex';
                const remainingMs = COOLDOWN_MS - timeDiff;
                const minutes = Math.floor(remainingMs / 60000);
                const seconds = Math.floor((remainingMs % 60000) / 1000);
                document.getElementById('timer-display').innerText = 
                    `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            } else {
                document.getElementById('cooldown-overlay').style.display = 'none';
            }
        }

        setInterval(updateUI, 1000);
        updateUI();

        inputs.forEach(input => {
            input.addEventListener('input', () => {
                if (postCount >= MAX_POSTS || (new Date().getTime() - lastPostTime) < COOLDOWN_MS) return;

                let isViolating = false;
                let isAllFilled = document.getElementById('diag-title').value.trim() !== "" &&
                                  document.getElementById('diag-desc').value.trim() !== "" &&
                                  document.getElementById('diag-result').value.trim() !== "";

                inputs.forEach(field => {
                    bannedWords.forEach(word => {
                        if (field.value.includes(word)) isViolating = true;
                    });
                });

                if (isViolating) {
                    warningBox.style.display = 'block';
                    publishBtn.disabled = true;
                    publishBtn.innerText = "公開不可（禁止ワード検知）";
                    publishBtn.style.borderColor = "#ff003c";
                    publishBtn.style.color = "#ff003c";
                } else {
                    warningBox.style.display = 'none';
                    publishBtn.style.borderColor = "#00ff41";
                    publishBtn.style.color = "#00ff41";
                    
                    if (isAllFilled) {
                        publishBtn.disabled = false;
                        publishBtn.innerText = "システムに公開する (+5 pt)";
                    } else {
                        publishBtn.disabled = true;
                        publishBtn.innerText = "必須項目を埋めろべ";
                    }
                }
            });
        });

        // 🔥 公開ボタン押下でFirebaseへ送信！
        publishBtn.addEventListener('click', async () => {
            if (postCount < MAX_POSTS) {
                postCount++;
                lastPostTime = new Date().getTime(); 
                
                creatorMileage += 5;
                localStorage.setItem('creatorMileage', creatorMileage);
                document.getElementById('mileage-val').innerText = creatorMileage;
                
                localStorage.setItem('postCount', postCount);
                localStorage.setItem('lastPostTime', lastPostTime);

                const titleVal = document.getElementById('diag-title').value;
                const descVal = document.getElementById('diag-desc').value;
                const resultVal = document.getElementById('diag-result').value;
                const tag1 = document.getElementById('tag1').value;
                const tag2 = document.getElementById('tag2').value;
                const tag3 = document.getElementById('tag3').value;

                // Firebaseの「diagnoses」ツリーに新規データをプッシュ
                const diagListRef = ref(db, 'diagnoses');
                const newDiagRef = push(diagListRef);
                await set(newDiagRef, {
                    title: titleVal,
                    desc: descVal,
                    resultPattern: resultVal,
                    tags: [tag1, tag2, tag3].filter(t => t.trim() !== ""),
                    authorName: userName,
                    authorId: userId,
                    createdAt: new Date().toISOString(),
                    playCount: 0,
                    recoCount: 0
                });

                // Firebase連携時のユーザーデータ更新（所持CM同期）
                const userRef = ref(db, 'users/' + userId);
                await set(userRef, {
                    name: userName,
                    cp: parseInt(localStorage.getItem('chaosPoint')) || 0,
                    cm: creatorMileage,
                    tutorial: localStorage.getItem('isTutorialDone') || 'false',
                    lastLogin: new Date().toLocaleString('ja-JP')
                });
                
                alert(`「${titleVal}」を世界に公開したべ！\n作者マイレージ +5pt 獲得！`);
                
                inputs.forEach(input => input.value = '');
                publishBtn.disabled = true;
                publishBtn.innerText = "必須項目を埋めろべ";
                updateUI(); 
            }
        });
    </script>
</body>
</html>
