<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>G-Chaospark | 観測実行</title>
    <style>
        body {
            margin: 0; background: #050505; color: #d1d1d1;
            font-family: 'Courier New', Courier, monospace; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 255, 65, 0.03) 2px, rgba(0, 255, 65, 0.03) 4px);
        }

        /* メインのプレイパネル */
        .play-box {
            background: rgba(18, 18, 18, 0.9); border: 1px solid #333; 
            border-top: 4px solid #00ff41; padding: 30px; border-radius: 5px;
            width: 100%; max-width: 600px; box-sizing: border-box;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.1);
        }

        #diag-title { color: #00ff41; margin-top: 0; font-size: 24px; border-bottom: 1px dashed #333; padding-bottom: 10px; }
        #diag-author { color: #888; font-size: 12px; text-align: right; margin-bottom: 20px; }
        #diag-desc { font-size: 14px; color: #aaa; margin-bottom: 30px; line-height: 1.6; }

        /* 入力エリア */
        .input-area { background: #0a0a0a; padding: 20px; border: 1px solid #222; margin-bottom: 20px; text-align: center; }
        .input-area label { display: block; color: #fff; margin-bottom: 10px; font-weight: bold; }
        .input-area input[type="text"] {
            width: 80%; background: #000; border: 1px solid #444; color: #fff;
            padding: 12px; font-size: 16px; text-align: center; font-family: inherit; transition: 0.3s;
        }
        .input-area input[type="text"]:focus { border-color: #00ff41; outline: none; box-shadow: 0 0 10px rgba(0, 255, 65, 0.3); }

        /* 実行ボタン */
        #execute-btn {
            width: 100%; background: transparent; color: #00ff41; border: 2px solid #00ff41;
            padding: 15px; font-size: 20px; font-weight: bold; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 2px;
        }
        #execute-btn:hover { background: #00ff41; color: #000; }
        #execute-btn:disabled { border-color: #555; color: #555; cursor: wait; background: #111; }

        /* 結果表示エリア（最初は隠す） */
        #result-area {
            display: none; margin-top: 30px; padding: 20px; 
            background: #001a05; border: 1px solid #00ff41; color: #fff;
            animation: glitch 0.3s 2;
        }
        @keyframes glitch {
            0% { transform: translate(0) }
            20% { transform: translate(-2px, 2px) }
            40% { transform: translate(-2px, -2px) }
            60% { transform: translate(2px, 2px) }
            80% { transform: translate(2px, -2px) }
            100% { transform: translate(0) }
        }
        #result-text { font-size: 18px; line-height: 1.8; font-weight: bold; text-align: center; }

        /* シェア＆アクション */
        .action-bar { display: none; justify-content: space-between; margin-top: 20px; padding-top: 15px; border-top: 1px dashed #333; }
        .action-btn { background: #111; border: 1px solid #333; color: #aaa; padding: 10px 15px; cursor: pointer; transition: 0.3s; flex: 1; margin: 0 5px; }
        .action-btn:hover { background: #222; color: #fff; border-color: #00ff41; }

        .back-link { display: block; text-align: center; margin-top: 40px; color: #444; text-decoration: none; }
        .back-link:hover { color: #00ff41; }
    </style>
</head>
<body>

    <div class="play-box">
        <!-- 診断の情報（JSで書き換えるべ） -->
        <h1 id="diag-title">Loading...</h1>
        <div id="diag-author">Author: Loading...</div>
        <div id="diag-desc">Loading...</div>

        <!-- プレイヤーの入力エリア -->
        <div class="input-area">
            <label>観測対象の名前を入力せよ</label>
            <input type="text" id="player-name" placeholder="名前を入力...">
        </div>

        <button id="execute-btn" onclick="executeDiag()">観測を開始する</button>

        <!-- 結果表示エリア -->
        <div id="result-area">
            <div style="color: #00ff41; font-size: 12px; margin-bottom: 10px; text-align: center;">[ 観測結果 ]</div>
            <div id="result-text"></div>
        </div>

        <!-- 評価＆シェア -->
        <div class="action-bar" id="action-bar">
            <button class="action-btn" onclick="alert('❤ いいねしたべ！')">❤ いいね</button>
            <button class="action-btn" onclick="alert('🔃 おすすめ権を使ったべ！')">🔃 おすすめ</button>
            <button class="action-btn" style="color: #1da1f2; border-color: #1da1f2;" onclick="alert('X(Twitter)に結果をシェアする画面が開くべ！')">Xでシェア</button>
        </div>
    </div>

    <a href="park.html" class="back-link">▶ 公園(プレイエリア)へ戻る</a>

    <script>
        // ----------------------------------------------------
        // 1. 診断データの読み込み（ダミーデータ or maker.htmlで作ったデータ）
        // ----------------------------------------------------
        // ※本来はDBからIDで引っ張ってくるが、今回はオフラインテスト用の仕組みだべ！
        const dummyTitle = localStorage.getItem('testDiagTitle') || "視界のノイズ診断";
        const dummyDesc = localStorage.getItem('testDiagDesc') || "最近、見えないはずのものが見えていませんか？\nあなたの視界のバグレベルを測定します。";
        const dummyResultPattern = localStorage.getItem('testDiagResult') || "【観測結果】\n[名前]の視界バグレベルは「限界突破」です。\n直ちに後ろを振り返らないでください。";
        
        // ローカルストレージの名前を初期値にする
        const savedUserName = localStorage.getItem('userName') || '';
        document.getElementById('player-name').value = savedUserName;

        // 画面に診断情報をセット
        document.getElementById('diag-title').innerText = dummyTitle;
        document.getElementById('diag-author').innerText = "Author: " + (localStorage.getItem('userName') || "謎の観測者");
        document.getElementById('diag-desc').innerText = dummyDesc;

        // ----------------------------------------------------
        // 2. 診断の実行（演出付き）
        // ----------------------------------------------------
        function executeDiag() {
            const nameInput = document.getElementById('player-name').value.trim();
            if(!nameInput) {
                alert("名前を入力しろべ！");
                return;
            }

            const btn = document.getElementById('execute-btn');
            const resultArea = document.getElementById('result-area');
            const actionBar = document.getElementById('action-bar');
            
            // UIを計算中（ローディング）に変更
            btn.disabled = true;
            btn.innerText = "システム干渉中... (Calculating...)";
            resultArea.style.display = 'none';
            actionBar.style.display = 'none';

            // カオスな雰囲気を出すために2秒遅らせるべ！
            setTimeout(() => {
                // [名前] という文字列を、入力された名前に置き換える処理
                let finalResult = dummyResultPattern.replace(/\[名前\]/g, nameInput).replace(/\[name\]/gi, nameInput);
                
                // 改行をHTMLの<br>に変換
                finalResult = finalResult.replace(/\n/g, '<br>');

                // 結果を表示！
                document.getElementById('result-text').innerHTML = finalResult;
                resultArea.style.display = 'block';
                actionBar.style.display = 'flex';
                
                btn.innerText = "再観測する";
                btn.disabled = false;
            }, 2000); // 2秒後に表示
        }
    </script>
</body>
</html>
